name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (shared, api, web, bot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm versiyasi root package.json'dagi "packageManager" maydonidan olinadi
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @smart/shared build

      - name: Generate Prisma client
        run: pnpm --filter @smart/api prisma:generate

      - name: Build API
        run: pnpm --filter @smart/api build

      - name: Run API tests
        run: pnpm --filter @smart/api test

      - name: Build web
        run: pnpm --filter @smart/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Build bot
        run: pnpm --filter @smart/bot build

  e2e:
    name: API e2e (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smart_murojaat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smart_murojaat?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @smart/shared build

      - name: Generate Prisma client
        run: pnpm --filter @smart/api prisma:generate

      - name: Apply migrations
        run: pnpm --filter @smart/api prisma:deploy

      - name: Seed database (tashkilot/kategoriyalar e2e uchun zarur)
        run: pnpm --filter @smart/api seed

      - name: Run API e2e tests
        run: pnpm --filter @smart/api test:e2e

  mobile:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze

      - name: Test
        working-directory: apps/mobile
        run: flutter test
