name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (shared, api, web, bot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm versiyasi root package.json'dagi "packageManager" maydonidan olinadi
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @smart/shared build

      - name: Generate Prisma client
        run: pnpm --filter @smart/api prisma:generate

      - name: Build API
        run: pnpm --filter @smart/api build

      - name: Build web
        run: pnpm --filter @smart/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Build bot
        run: pnpm --filter @smart/bot build
